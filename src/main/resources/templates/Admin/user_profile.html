<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="\WebChiaSeTaiLieu\src\main\resources\static\css\style.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar">
          <div
            class="logo-section d-flex align-items-center justify-content-center"
          >
            <h3 class="logo">
              <img src="\WebChiaSeTaiLieu\src\main\resources\static\images\pdfhub 6.png" alt="Logo" style="width: 100px" />
            </h3>
          </div>
          <div class="nav-section">
            <ul class="nav flex-column">
              <li class="nav-item">
                <a class="nav-link" href="dashboard.html">
                  <i class="fas fa-tachometer-alt me-2"></i>
                  Dashboard
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="user_profile.html">
                  <i class="fas fa-user me-2"></i>
                  User Profile
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="quanlytaikhoan.html">
                  <i class="fas fa-users-cog me-2"></i>
                  Quản lý tài khoản
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="quanlytailieu.html">
                  <i class="fas fa-file-alt me-2"></i>
                  Quản lý tài liệu
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="quanlyphanhoi.html">
                  <i class="fas fa-comment-alt me-2"></i>
                  Quản lý phản hồi
                </a>
              </li>
            </ul>
          </div>
        </nav>

        <!-- Main content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
          <!-- Top Navbar -->
          <nav class="navbar navbar-expand-lg navbar-light top-navbar">
            <div class="container-fluid">
              <a class="navbar-brand d-none d-md-block" href="#">
                <img src="\WebChiaSeTaiLieu\src\main\resources\static\images\pdfhub 6.png" alt="Logo" width="100" />
              </a>
              <div class="d-flex align-items-center">
                <a class="nav-link me-3" href="#">
                  <i class="fas fa-bell"></i>
                  <span class="badge bg-danger"></span>
                </a>
                <div class="dropdown">
                  <a
                    class="nav-link dropdown-toggle d-flex align-items-center"
                    href="#"
                    id="navbarDropdown"
                    role="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                  >
                    <span class="user-profile me-2">
                      <img src="\WebChiaSeTaiLieu\src\main\resources\static\images\Ellipse 14.png" alt="User" />
                    </span>
                    Quân sói đơn độc
                  </a>
                  <ul
                    class="dropdown-menu dropdown-menu-end"
                    aria-labelledby="navbarDropdown"
                  >
                    <li>
                      <a class="dropdown-item" href="\WebChiaSeTaiLieu\src\main\resources\static\images\user_profile.html"
                        >Profile</a
                      >
                    </li>
                    <li><hr class="dropdown-divider" /></li>
                    <li>
                      <a class="dropdown-item" href="login.html">Log out</a>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </nav>

          <!-- Profile and Form Section -->
          <div class="row mt-5">
            <div class="col-12">
              <div class="card p-4">
                <div class="row">
                  <!-- Form Section -->
                  <div class="col-md-8">
                    <h4>Edit Profile</h4>
                    <form>
                      <div class="row mb-3">
                        <div class="col-md-6">
                          <label class="form-label">User Name</label>
                          <input
                            type="text"
                            class="form-control"
                            placeholder="User name"
                          />
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Email Address</label>
                          <input
                            type="email"
                            class="form-control"
                            placeholder="Email"
                          />
                        </div>
                      </div>
                      <div class="row mb-3">
                        <div class="col-md-6">
                          <label class="form-label">First Name</label>
                          <input
                            type="text"
                            class="form-control"
                            placeholder="First Name"
                          />
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Last Name</label>
                          <input
                            type="text"
                            class="form-control"
                            placeholder="Last Name"
                          />
                        </div>
                      </div>
                      <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input
                          type="text"
                          class="form-control"
                          placeholder="Address"
                        />
                      </div>
                      <div class="row mb-3">
                        <div class="col-md-6">
                          <label class="form-label">City</label>
                          <input
                            type="text"
                            class="form-control"
                            placeholder="City"
                          />
                        </div>
                        <div class="col-md-6">
                          <label class="form-label">Country</label>
                          <input
                            type="text"
                            class="form-control"
                            placeholder="Country"
                          />
                        </div>
                      </div>
                      <div class="mb-3">
                        <button class="btn btn-primary">Update Profile</button>
                      </div>
                    </form>
                  </div>

                  <!-- Profile Card Section -->
                  <div class="col-md-4">
                    <div class="card card-profile text-center">
                      <div class="card-body">
                        <img
                          src="\WebChiaSeTaiLieu\src\main\resources\static\images\Ellipse 14.png"
                          class="rounded-circle mb-3"
                          alt="Profile"
                          width="120"
                          height="120"
                        />
                        <h5 class="card-title">Quân sói đơn độc</h5>
                        <p class="card-text">
                          Tôi là 1 con sói thích trẻ em à hú
                        </p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
