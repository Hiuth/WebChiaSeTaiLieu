server:
  port: 8088

otp:
  expiration: 5

spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/webchiasetailieu"
    username: root
    password: 251204

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      format_sql: true
  logging:
    level:
      root: DEBUG

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB
  mail:
    host: smtp.example.com         # Thay thế bằng địa chỉ máy chủ SMTP của bạn
    port: 587                       # Thay thế bằng cổng SMTP, thường là 587 cho TLS hoặc 465 cho SSL
    username: your-email@example.com # Thay thế bằng tên đăng nhập email của bạn
    password: your-email-password    # Thay thế bằng mật khẩu email của bạn
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
